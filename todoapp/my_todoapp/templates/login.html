{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Asad's App</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}?v=1.1">
</head>
<body>

    <div class="login-container">
        <h1 class="brand-logo">Asad's App</h1>
        <h3>Welcome Back</h3>
        
        <form action="" method="POST" class="auth-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">User Name</label>
                <input type="text" id="username" placeholder="Enter Name" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter Password" name="password" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>
        
        <div class="auth-footer">
            <a href="{% url 'Register' %}" class="register-link">Don't have an account? <span>Register</span></a>
        </div>
    </div>

</body>
</html>
