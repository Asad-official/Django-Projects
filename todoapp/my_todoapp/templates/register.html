{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Asad's App | Register</title>
    <link rel="stylesheet" href="{% static 'css/register.css' %}?v=2.0">
</head>
<body>

    <div class="registration-card">
        <div class="card-header">
            <h1 class="brand-logo">Asad's App</h1>
            <p class="subtitle">Join our community today</p>
        </div>
        
        <form action="" method="POST" class="register-form">
            {% csrf_token %}
            
            <div class="django-form-body">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-signup">
                <span>Create My Account</span>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already a member? <a href="{% url 'Login' %}" class="login-link">Login Here</a></p>
        </div>
    </div>

</body>
</html>
